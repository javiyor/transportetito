services:
  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - appnet

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    volumes:
      - ./laravel:/var/www/html:ro
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - appnet

  app:
    build:
      context: ./infra/php
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
    volumes:
      - ./laravel:/var/www/html
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - appnet

  queue:
    build:
      context: ./infra/php
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90"]
    volumes:
      - ./laravel:/var/www/html
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - appnet

  scheduler:
    build:
      context: ./infra/php
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - ./laravel:/var/www/html
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - appnet

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-transportetito}
      POSTGRES_USER: ${DB_USERNAME:-transportetito}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-transportetito}
    ports:
      - "54320:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet

  redis:
    image: redis:7-alpine
    ports:
      - "63790:6379"
    networks:
      - appnet

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123456}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - appnet

volumes:
  pgdata:
  miniodata:
  caddy_data:
  caddy_config:

networks:
  appnet:
    driver: bridge
